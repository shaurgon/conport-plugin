name: Build skill zips

# Runs inside the mirrored marketplace repo (shaurgon/conport-plugin).
#
# Two triggers:
#   1. Push to main under skills/** → rolling `skills-latest` release
#   2. Tag push v*.*.* → versioned release (e.g. v2.0.0)
#
# Only the public `conport` skill is bundled here. conport-agent is a separate
# PRIVATE installable unit (its own private repo) and is NOT published from this
# public mirror.

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.github/workflows/build-skill-zips.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-skill-zips
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read plugin version
        id: version
        run: |
          ver=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "plugin_version=$ver" >> "$GITHUB_OUTPUT"

      - name: Read skill version
        id: skill_versions
        run: |
          conport_ver=$(grep -oP 'version:\s*\K\S+' skills/conport/SKILL.md | head -1)
          echo "conport=$conport_ver" >> "$GITHUB_OUTPUT"

      - name: Zip skill
        run: |
          set -euo pipefail
          cd skills
          zip -qr ../conport-skill.zip conport
          cd ..
          ls -lh conport-skill.zip

      - name: Publish rolling release (on branch push)
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: skills-latest
          name: Skills (latest)
          body: |
            Auto-built zip bundle of the portable ConPort skill.

            **Plugin:** v${{ steps.version.outputs.plugin_version }}
            **Skill:** conport v${{ steps.skill_versions.outputs.conport }}

            - `conport-skill.zip` — project context

            Upload to Claude.ai via **Settings → Features → Skills → Upload Skill**.
          files: |
            conport-skill.zip
          make_latest: "false"

      - name: Publish versioned release (on tag push)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.plugin_version }}
          body: |
            ## ConPort Plugin v${{ steps.version.outputs.plugin_version }}

            **Skill:** conport v${{ steps.skill_versions.outputs.conport }}

            ### Assets
            - `conport-skill.zip` — project context skill

            Upload to Claude.ai via **Settings → Features → Skills → Upload Skill**.
          files: |
            conport-skill.zip
          make_latest: "true"
